services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: ai-scientist-backend:dev
    container_name: ai-scientist-backend
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - SEMANTIC_SCHOLAR_API_KEY=${SEMANTIC_SCHOLAR_API_KEY:-}
      - AI_SCIENTIST_DEFAULT_PROVIDER=${AI_SCIENTIST_DEFAULT_PROVIDER:-anthropic}
      - AI_SCIENTIST_CORS_ORIGINS=http://localhost:3000
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - backend_data:/app/data
    command: uvicorn ai_scientist.api.main:app --host 0.0.0.0 --port 8000

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: ai-scientist-frontend:dev
    container_name: ai-scientist-frontend
    environment:
      - NEXT_PUBLIC_API_BASE=http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    command: npm run dev

volumes:
  backend_data:
